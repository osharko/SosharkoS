product: waydroid
summary: Waydroid + androidbox — Android in container LXC, app in finestre native, opt-in persistente + cartelle condivise host↔Android (§16)
category: emulation
package: waydroid
binary: waydroid
tests:
  - name: binario waydroid presente (immagine)
    level: headless
    context: image
    cmd: command -v waydroid
  - name: pacchetto waydroid installato (base Fedora 44)
    level: headless
    context: image
    cmd: rpm -q waydroid
  - name: deps runtime presenti (lxc/dnsmasq/python3-gbinder)
    level: headless
    context: image
    cmd: rpm -q lxc dnsmasq python3-gbinder python3-dbus python3-gobject
  - name: kernel CachyOS con binder built-in (=y)
    level: headless
    context: image
    cmd: KVER=$(ls /usr/lib/modules | grep cachyos | head -1); C=/usr/lib/modules/$KVER/config; grep -qx CONFIG_ANDROID_BINDER_IPC=y "$C" && grep -qx CONFIG_ANDROID_BINDERFS=y "$C"
  - name: nessun modules-load.d binder (kernel built-in, atteso)
    level: headless
    context: image
    cmd: '! test -e /etc/modules-load.d/waydroid-binder.conf'
  - name: waydroid-container.service presente ma DISABILITATO di default
    level: headless
    context: image
    cmd: '[ "$(systemctl is-enabled waydroid-container.service 2>/dev/null)" != enabled ]'
  - name: androidbox-start/stop/status presenti ed eseguibili (immagine)
    level: headless
    context: image
    cmd: test -x /usr/bin/androidbox-start && test -x /usr/bin/androidbox-stop && test -x /usr/bin/androidbox-status
  - name: androidbox-share presente ed eseguibile + unshare symlink (immagine)
    level: headless
    context: image
    cmd: test -x /usr/bin/androidbox-share && test -L /usr/bin/androidbox-unshare && [ "$(readlink /usr/bin/androidbox-unshare)" = androidbox-share ]
  - name: androidbox-watch + root helper presenti ed eseguibili (immagine)
    level: headless
    context: image
    cmd: test -x /usr/bin/androidbox-watch && test -x /usr/libexec/androidbox-scan
  - name: inotify-tools installato (androidbox-watch dipende da inotifywait)
    level: headless
    context: image
    cmd: rpm -q inotify-tools && command -v inotifywait
  - name: sudoers androidbox-scan presente, 0440, visudo-valido e STRETTO
    level: headless
    context: image
    cmd: >-
      test -f /etc/sudoers.d/androidbox-scan
      && [ "$(stat -c%a /etc/sudoers.d/androidbox-scan)" = 440 ]
      && visudo -cf /etc/sudoers.d/androidbox-scan
      && grep -q '^%wheel ALL=(root) NOPASSWD: /usr/libexec/androidbox-scan$' /etc/sudoers.d/androidbox-scan
  - name: androidbox-scan rifiuta subdir non valide (NOPASSWD-safe)
    level: headless
    context: image
    cmd: '! /usr/libexec/androidbox-scan ../etc 2>/dev/null && ! /usr/libexec/androidbox-scan "" 2>/dev/null'
  - name: androidbox-watch.service (user unit) presente
    level: headless
    context: image
    cmd: test -e /usr/lib/systemd/user/androidbox-watch.service
  - name: androidbox-watch.service NON enabled di default (opt-in per-utente)
    level: headless
    context: image
    cmd: '! ls /usr/lib/systemd/user/graphical-session.target.wants/androidbox-watch.service 2>/dev/null && ! ls /etc/systemd/user/graphical-session.target.wants/androidbox-watch.service 2>/dev/null'
  - name: waydroid-session.service (user unit) presente
    level: headless
    context: image
    cmd: test -e /usr/lib/systemd/user/waydroid-session.service
  - name: waydroid-session.service NON enabled di default (opt-in per-utente)
    level: headless
    context: image
    cmd: '! ls /usr/lib/systemd/user/graphical-session.target.wants/waydroid-session.service 2>/dev/null && ! ls /etc/systemd/user/graphical-session.target.wants/waydroid-session.service 2>/dev/null'
  - name: androidbox-start → waydroid init -s GAPPS (primo uso)
    level: display
    steps: |
      Su VM grafica (🟡): al primo `androidbox-start` parte `sudo waydroid init
      -s GAPPS` (download ~1GB system/vendor con Google Apps in /var, serve rete),
      poi abilita+avvia waydroid-container (system) e waydroid-session (user) e
      imposta persist.waydroid.multi_windows=true. Da quel momento Android torna
      a ogni boot/login finché non esegui `androidbox-stop`. `androidbox-status`
      mostra waydroid status + is-enabled/is-active di entrambe le unit.
  - name: app Android in finestra propria (multi-window) + Play Store certificato
    level: human
    steps: |
      Su HW reale (🔴, serve GPU per il rendering accelerato; questo host = AMD
      Radeon): con persist.waydroid.multi_windows=true ogni app Android gira in
      una finestra Niri DEDICATA, avviabile dal launcher (le app esportano
      launcher .desktop propri) o con `waydroid app launch <id>`. Per Play Store:
      registra l'android_id del device su
      https://www.google.com/android/uncertified/ (certificazione), poi login
      account Google. Richiede account + GPU reale → solo umano.
  - name: condivisione cartelle host↔Android (androidbox-share)
    level: display
    steps: |
      Su VM/HW con Android avviato (🟡, serve waydroid init + sessione): esegui
      `androidbox-share` (senza argomenti) → popola ~/.config/androidbox/shares
      coi default dai tuoi XDG dir (Pictures/Download/Music/Documents/Movies, solo
      quelli esistenti) e bind-monta ogni cartella host su <DATADIR>/media/0/<sub>
      (DATADIR rilevato dinamicamente: ~/.local/share/waydroid/data in user-mode,
      /var/lib/waydroid/data in system-mode). Verifica:
        - `mount | grep waydroid/data/media/0` mostra i bind attivi;
        - `sudo waydroid shell -- ls /storage/emulated/0/Pictures` elenca i file
          della tua cartella host (Android li VEDE);
        - dopo aver aggiunto un file host-side, il rescan SENZA riavvio
          (`content call --uri content://media --method scan_file --arg …`,
          eseguito in automatico) fa salire il conteggio MediaStore
          (`content query --uri content://media/external/images/media
          --projection _id | wc -l`).
      `androidbox-share --list` mostra mapping + stato; `androidbox-unshare --all`
      smonta tutto lasciando le cartelle host INTATTE (verifica `mount` pulito).
      I bind si ri-applicano a ogni `androidbox-start` e si smontano in
      `androidbox-stop`. VERIFICATO su host CachyOS (user-mode): Android vede i
      file host, rescan no-restart funziona, unshare pulito.
  - name: auto-rescan MediaStore (androidbox-watch) — file host → Galleria senza comandi
    level: display
    steps: |
      Su VM/HW con Android avviato e cartelle condivise attive (🟡): `androidbox-start`
      abilita la USER unit `androidbox-watch.service` (`systemctl --user is-active
      androidbox-watch` = active). Il demone fa un singolo `inotifywait -m -r` su
      tutte le HOSTDIR della config e, a ogni modifica, mappa l'evento alla SUBDIR
      Android e chiama `sudo /usr/libexec/androidbox-scan <SUBDIR>` (debounce ~1
      scan/2s per subdir). Verifica:
        - conteggio MediaStore prima:
          `sudo waydroid shell -- sh -c 'content query --uri
          content://media/external/images/media --projection _id | wc -l'`;
        - aggiungi UN file immagine in una cartella host condivisa (es. ~/Immagini)
          SENZA alcun comando manuale;
        - entro pochi secondi il conteggio sale di 1 e il file compare in Galleria;
        - eliminando il file host, un nuovo scan lo rimuove dal conteggio.
      Il root helper valida la subdir ([A-Za-z0-9_]) e la regola sudoers concede il
      NOPASSWD SOLO su /usr/libexec/androidbox-scan (NON su `waydroid shell`).
      `androidbox-stop` disabilita la watch prima di smontare i bind.
      VERIFICATO su host CachyOS (user-mode): drop in ~/Immagini → MediaStore
      31→32 in automatico via la watch; delete → rescan riporta il conteggio giù.
