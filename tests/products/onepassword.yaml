product: onepassword
summary: 1Password + CLI (nativo; no flatpak ufficiale)
category: vault
package: 1password
binary: 1password
tests:
  - name: 1password + op presenti
    level: headless
    context: image
    cmd: command -v 1password && command -v op
  - name: unlock account + SSH agent
    level: human
    steps: |
      Login con account 1Password → unlock → l'SSH agent risponde a `ssh-add -l`.
