name: Build, test & push

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", "ROADMAP.md", "docs/**", ".vscode/**", "tests/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "5 10 * * *"   # daily: ripulisce upstream (fedora-bootc + Cachy kernel)
  workflow_dispatch:

env:
  IMAGE_NAME: sosharkos
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.repository_owner }}

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      # L'immagine è ~10G: il runner (~14G liberi) va liberato o il build fallisce
      # con "no space left on device" (era questa la causa del fail).
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Deps host per i test (yq python = sintassi jq; jq già presente)
        run: |
          pipx install yq || python3 -m pip install --user yq
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          echo "$(python3 -m site --user-base)/bin" >> "$GITHUB_PATH"

      - name: Build image (podman, come in locale)
        run: podman build -t "${IMAGE_NAME}:ci" -f Containerfile .

      - name: Tier 1 — introspezione (pacchetti/unit/file/codec)
        run: bash tests/test-image.sh "${IMAGE_NAME}:ci"

      - name: Test per-prodotto (contesto image)
        run: bash tests/run-products.sh --context image --image "${IMAGE_NAME}:ci"

      - name: Tag (date + sha)
        id: t
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # Push solo su main/schedule/dispatch (NON su pull_request). I test sopra
      # gateano: se falliscono, il job si ferma prima del push.
      - name: Login GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${REGISTRY_USER}" --password-stdin "${REGISTRY}"

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          owner="$(echo "${REGISTRY_USER}" | tr '[:upper:]' '[:lower:]')"
          for tag in latest "${{ steps.t.outputs.date }}" "$(echo ${{ github.sha }} | cut -c1-7)"; do
            podman tag "${IMAGE_NAME}:ci" "${REGISTRY}/${owner}/${IMAGE_NAME}:${tag}"
            podman push "${REGISTRY}/${owner}/${IMAGE_NAME}:${tag}"
          done

  # Tier 2/3 (boot VM, e2e, integrazione) richiedono /dev/kvm → NON girano sui
  # runner GitHub hosted. Si eseguono in locale (just test-vm / test-vm-gui /
  # integration) o su un runner self-hosted con KVM. Vedi docs/testing.md.
