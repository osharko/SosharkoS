name: Build, test & push

on:
  push:
    branches: [main]
    paths-ignore: ["README.md", "ROADMAP.md", "CLAUDE.md", "docs/**", ".vscode/**"]
  pull_request:
    branches: [main]
  schedule:
    - cron: "5 10 * * *"   # daily: ripulisce upstream (fedora-bootc + Cachy kernel)
  workflow_dispatch:

env:
  IMAGE_NAME: sosharkos
  REGISTRY: ghcr.io
  REGISTRY_USER: ${{ github.repository_owner }}

# Niente divergenza locale↔CI: TUTTI i job lanciano lo stesso `tests/ci.sh`.
jobs:
  # Hosted (NO KVM): build + Tier1 + per-prodotto(image) → push. Stesso script
  # che giri in locale con `tests/ci.sh --no-vm`.
  build-test:
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    steps:
      - uses: actions/checkout@v4

      # immagine ~10G vs ~14G liberi → senza questo il build fallisce (era il bug)
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with: { tool-cache: true, large-packages: true, docker-images: true, swap-storage: true }

      - name: yq (python = sintassi jq; jq già presente sul runner)
        run: |
          pipx install yq || python3 -m pip install --user yq
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build + test (entrypoint unico, no-VM)
        run: IMAGE="${IMAGE_NAME}:ci" bash tests/ci.sh --no-vm

      - name: Tag date
        id: t
        run: echo "date=$(date +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Login GHCR
        if: github.event_name != 'pull_request'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | podman login -u "${REGISTRY_USER}" --password-stdin "${REGISTRY}"

      - name: Push image
        if: github.event_name != 'pull_request'
        run: |
          owner="$(echo "${REGISTRY_USER}" | tr '[:upper:]' '[:lower:]')"
          for tag in latest "${{ steps.t.outputs.date }}" "$(echo ${{ github.sha }} | cut -c1-7)"; do
            podman tag "${IMAGE_NAME}:ci" "${REGISTRY}/${owner}/${IMAGE_NAME}:${tag}"
            podman push "${REGISTRY}/${owner}/${IMAGE_NAME}:${tag}"
          done

  # Self-hosted CON KVM: Tier2/3 (boot VM + smoke + e2e per-prodotto + integrazione
  # + render grafico). Stesso script: `tests/ci.sh --vm-only`.
  # Si attiva SOLO se hai registrato un runner self-hosted con label 'kvm' e
  # impostato la variabile repo HAS_KVM_RUNNER=true (Settings→Secrets and
  # variables→Actions→Variables). Altrimenti viene saltato (non blocca).
  e2e-kvm:
    needs: build-test
    if: ${{ vars.HAS_KVM_RUNNER == 'true' && github.event_name != 'pull_request' }}
    runs-on: [self-hosted, kvm]
    steps:
      - uses: actions/checkout@v4
      - name: Pull immagine appena pushata
        run: |
          owner="$(echo "${REGISTRY_USER}" | tr '[:upper:]' '[:lower:]')"
          podman pull "${REGISTRY}/${owner}/${IMAGE_NAME}:latest"
          podman tag  "${REGISTRY}/${owner}/${IMAGE_NAME}:latest" "${IMAGE_NAME}:ci"
      - name: Tier2/3 in VM (entrypoint unico, vm-only)
        run: IMAGE="${IMAGE_NAME}:ci" bash tests/ci.sh --vm-only
